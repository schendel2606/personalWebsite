name = "niv-chat-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e65b8d3f0b454cec86a8f2dda0932aa1"

# Production: bind the Worker to chat.niv.schendel.me as a Cloudflare-managed
# custom domain. This auto-creates the proxied DNS record and SSL cert on deploy,
# so we don't need a separate manual DNS entry for the chat subdomain.
[[routes]]
pattern = "chat.niv.schendel.me"
custom_domain = true

# Vars (non-secret) — secrets are set via `wrangler secret put`
[vars]
ALLOWED_ORIGIN = "https://niv.schendel.me"
COOKIE_DOMAIN = "chat.niv.schendel.me"
RATE_LIMIT_PER_HOUR = "10"
MAX_INPUT_CHARS = "500"
MAX_OUTPUT_TOKENS = "400"
