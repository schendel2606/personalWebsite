name = "niv-chat-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "e65b8d3f0b454cec86a8f2dda0932aa1"

# Production route: chat.niv.schendel.me. Local dev uses wrangler dev (no route).
[[routes]]
pattern = "chat.niv.schendel.me/*"
zone_name = "schendel.me"

# Vars (non-secret) — secrets are set via `wrangler secret put`
[vars]
ALLOWED_ORIGIN = "https://niv.schendel.me"
COOKIE_DOMAIN = "chat.niv.schendel.me"
RATE_LIMIT_PER_HOUR = "10"
MAX_INPUT_CHARS = "500"
MAX_OUTPUT_TOKENS = "400"
